name: Deploy DataCollection to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        cd DataCollection
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        cd DataCollection
        python -c "print('DataCollection tests - basic validation')"
        python -c "import os; print('Files present:', len(os.listdir('.')))"
        
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          # Navigate to deployment directory
          cd /home/ubuntu/mydscvr-datacollection/DataCollection
          git pull origin main
          
          # Deploy environment files with GitHub secrets
          echo "🔐 Creating secure environment files with GitHub Secrets..."
          
          # Create AI_API.env with all AI service keys
          cat > AI_API.env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}
          
          # Rate limiting settings
          FIRECRAWL_RATE_LIMIT=100
          PERPLEXITY_RATE_LIMIT=1000
          
          # Error handling
          MAX_RETRY_ATTEMPTS=3
          RETRY_DELAY_SECONDS=5
          EOF
          
          # Create Mongo.env with database configuration
          cat > Mongo.env << EOF
          MONGO_URI=${{ secrets.MONGO_URI }}
          EOF
          
          # Create DataCollection.env with full hybrid mode configuration
          cat > DataCollection.env << EOF
          # DXB Events Data Collection Pipeline - Environment Variables
          
          # Environment Configuration
          ENVIRONMENT=production
          DEBUG=false
          LOG_LEVEL=INFO
          
          # MongoDB Configuration
          MONGO_URI=${{ secrets.MONGO_URI }}
          MONGO_USER=${{ secrets.MONGO_USER }}
          MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
          MONGO_DB_NAME=DXB
          
          # Redis Configuration
          REDIS_URL=redis://localhost:6379/0
          
          # API Keys (REQUIRED)
          FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          
          # Google OAuth Configuration
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          
          # Backend Integration
          BACKEND_API_URL=${{ secrets.BACKEND_API_URL }}
          BACKEND_WEBHOOK_URL=${{ secrets.BACKEND_WEBHOOK_URL }}
          BACKEND_API_KEY=${{ secrets.BACKEND_API_KEY }}
          
          # Rate Limiting Settings
          FIRECRAWL_RATE_LIMIT=100
          PERPLEXITY_RATE_LIMIT=1000
          
          # Error Handling
          MAX_RETRY_ATTEMPTS=3
          RETRY_DELAY_SECONDS=5
          
          # Monitoring Configuration
          METRICS_PORT=8001
          ENABLE_MONITORING=true
          
          # Scraping Configuration
          DEFAULT_SCRAPING_TIMEOUT=30
          MAX_CONCURRENT_SCRAPERS=3
          RATE_LIMIT_DELAY=1
          
          # AI Processing Configuration
          AI_TEMPERATURE=0.7
          MAX_AI_RETRIES=3
          AI_TIMEOUT=30
          
          # AI Image Generation Configuration (HYBRID MODE)
          ENABLE_AI_IMAGE_GENERATION=true
          AI_IMAGE_BATCH_SIZE=5
          AI_IMAGE_BATCH_DELAY=10
          
          # Firecrawl MCP Configuration (HYBRID MODE)
          ENABLE_FIRECRAWL_SUPPLEMENT=true
          FIRECRAWL_PLATINUMLIST_LIMIT=20
          FIRECRAWL_TIMEOUT_LIMIT=12
          FIRECRAWL_WHATSON_LIMIT=8
          FIRECRAWL_TIMEOUT_SECONDS=60
          FIRECRAWL_MAX_PAGES_PER_SOURCE=40
          FIRECRAWL_CONCURRENT_EXTRACTIONS=2
          
          # Data Quality Thresholds
          MIN_QUALITY_SCORE=70
          ENABLE_FAMILY_ANALYSIS=true
          ENABLE_CONTENT_ENHANCEMENT=true
          EOF
          
          # Set secure permissions on environment files
          chmod 600 AI_API.env Mongo.env DataCollection.env
          
          echo "✅ Environment files created successfully with GitHub secrets"
          
          # Copy hybrid mode files to production directory
          echo "📁 Copying hybrid mode files to production directory..."
          cp enable_hybrid_mode.sh HYBRID_MODE_DEPLOYMENT.md test_cron_logging.sh enhanced_collection.py /home/ubuntu/DXB-events/DataCollection/
          cp DataCollection.env AI_API.env Mongo.env /home/ubuntu/DXB-events/DataCollection/
          chmod +x /home/ubuntu/DXB-events/DataCollection/enable_hybrid_mode.sh
          chmod +x /home/ubuntu/DXB-events/DataCollection/test_cron_logging.sh
          
          # Update virtual environment and dependencies
          cd /home/ubuntu/DXB-events/DataCollection
          if [ ! -d "venv" ]; then
            echo "Creating virtual environment..."
            python3 -m venv venv
          fi
          
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          
          echo "🎉 Hybrid mode deployment completed successfully!"
          echo "🔥 Firecrawl MCP: ENABLED"
          echo "🎨 AI Image Generation: ENABLED"
          echo "📊 Configuration: From GitHub Secrets"
          
          # Verify hybrid mode configuration
          if [ -f "verify_hybrid_mode.py" ]; then
            python verify_hybrid_mode.py
          fi