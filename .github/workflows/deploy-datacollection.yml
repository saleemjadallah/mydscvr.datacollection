name: Deploy DataCollection to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        cd DataCollection
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        cd DataCollection
        python -c "print('DataCollection tests - basic validation')"
        python -c "import os; print('Files present:', len(os.listdir('.')))"
        
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          # Create deployment directory if it doesn't exist
          if [ ! -d "/home/ubuntu/mydscvr-datacollection" ]; then
            echo "Creating deployment directory..."
            mkdir -p /home/ubuntu/mydscvr-datacollection
            cd /home/ubuntu/mydscvr-datacollection
            git clone https://github.com/${{ github.repository }}.git .
          else
            cd /home/ubuntu/mydscvr-datacollection
            git pull origin main
          fi
          
          # Navigate to DataCollection subdirectory
          cd DataCollection
          
          # Deploy environment files with secrets
          echo "Creating environment files with GitHub Secrets..."
          
          # Create AI_API.env with all AI service keys
          cat > AI_API.env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          EOF
          
          # Create Mongo.env with database configuration
          cat > Mongo.env << EOF
          Mongo_URI=${{ secrets.MONGO_URI }}
          EOF
          
          # Create DataCollection.env with all configuration
          cat > DataCollection.env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          MONGO_URI=${{ secrets.MONGO_URI }}
          EOF
          
          # Set secure permissions on environment files
          chmod 600 AI_API.env Mongo.env DataCollection.env
          
          echo "Environment files created successfully"
          
          # Create virtual environment if it doesn't exist
          if [ ! -d "venv" ]; then
            echo "Creating virtual environment..."
            python3 -m venv venv
          fi
          
          # Activate virtual environment and install dependencies
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          
          # Check if systemctl service exists, if not just report status
          if systemctl list-units --full -all | grep -Fq "mydscvr-datacollection.service"; then
            echo "Restarting mydscvr-datacollection service..."
            sudo systemctl restart mydscvr-datacollection
            sudo systemctl status mydscvr-datacollection
          else
            echo "Service mydscvr-datacollection.service not found - deployment completed without service restart"
            echo "You may need to set up the systemd service manually"
          fi